# bacon.toml
# Default job for individual crate development
default_job = "dev"

# === INDIVIDUAL CRATE DEVELOPMENT ===
[jobs.dev]
command = ["cargo", "check"]
need_stdout = false
watch = ["*/src/"]
on_success = "job:dev-clippy"

[jobs.dev-clippy]
command = ["cargo", "clippy"]
need_stdout = false
watch = ["*/src/"]

# === WORKSPACE-WIDE DEVELOPMENT ===
[jobs.workspace]
command = ["cargo", "check", "--workspace"]
need_stdout = false  
watch = ["*/src/", "tests/"]
on_success = "job:workspace-clippy"

[jobs.workspace-clippy]
command = ["cargo", "clippy", "--workspace", "--", "-D", "warnings"]
need_stdout = false
watch = ["*/src/", "tests/"]
on_success = "job:workspace-test"

[jobs.workspace-test]
command = ["cargo", "test", "--workspace"]
need_stdout = true
watch = ["*/src/", "tests/"]

# === CI/RELEASE PIPELINE ===
[jobs.ci]
command = ["cargo", "check", "--workspace"]
need_stdout = false
watch = ["*/src/", "tests/"]
on_success = "job:ci-clippy"

[jobs.ci-clippy]
command = ["cargo", "clippy", "--workspace", "--", "-D", "warnings"]
need_stdout = false
on_success = "job:ci-test"

[jobs.ci-test]
command = ["cargo", "test", "--workspace"]
need_stdout = true
on_success = "job:ci-fmt"

[jobs.ci-fmt]
command = ["cargo", "fmt", "--check"]
need_stdout = false
on_success = "job:coverage"

[jobs.coverage]
command = ["cargo", "tarpaulin", "--out", "Html", "--output-dir", "target/coverage"]
need_stdout = true
on_success = "job:mutants"

[jobs.mutants]
command = ["cargo", "mutants", "--output", "html", "--output-dir", "target/mutants"]
need_stdout = true

# === INDIVIDUAL JOBS FOR MANUAL USE ===
[jobs.check]
command = ["cargo", "check", "--workspace"]
need_stdout = false
watch = ["*/src/", "tests/"]

[jobs.clippy]
command = ["cargo", "clippy", "--workspace"]
need_stdout = false
watch = ["*/src/", "tests/"]

[jobs.clippy-strict]
command = ["cargo", "clippy", "--workspace", "--", "-D", "warnings"]
need_stdout = false
watch = ["*/src/", "tests/"]

[jobs.test]
command = ["cargo", "test", "--workspace"]
need_stdout = true
watch = ["*/src/", "tests/"]

[jobs.fmt]
command = ["cargo", "fmt"]
need_stdout = false
watch = ["*/src/", "tests/"]

[jobs.install]
command = ["cargo", "install", "--path", "."]
need_stdout = true
watch = ["*/src/", "tests/"]